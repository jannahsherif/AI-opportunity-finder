<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Opportunity Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f5f4f0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* THE CHAT BOX */
        #chat {
            background: white;
            height: 450px;
            border: 1px solid #ddd;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* User Message (Right) */
        .msg-user {
            align-self: flex-end;
            background: #000;
            color: #fff;
            padding: 10px 16px;
            border-radius: 18px 18px 2px 18px;
            max-width: 70%;
            font-size: 14px;
        }

        /* AI Message (Left) */
        .msg-ai {
            align-self: flex-start;
            background: #f0f0f0;
            color: #333;
            padding: 10px 16px;
            border-radius: 18px 18px 18px 2px;
            max-width: 70%;
            font-size: 14px;
            border: 1px solid #e0e0e0;
        }

        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        button { background: #000; color: #fff; border: none; padding: 0 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .card { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">Jannah.A | Finder</h2>
    
    <div id="chat">
        <div class="msg-ai">Hello! I can help you find hackathons or competitions. What are you looking for?</div>
    </div>

    <div class="input-group">
        <input type="text" id="user-input" placeholder="Type your search and press Enter...">
        <button id="find-btn">FIND</button>
    </div>

    <div id="results-panel" style="display:none;">
        <h3 id="count-text">0 found</h3>
        <div id="results-grid" class="results-grid"></div>
    </div>
</div>

<script>
    const input = document.getElementById('user-input');
    const chat = document.getElementById('chat');
    const btn = document.getElementById('find-btn');

    // Enter Key Support
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    btn.addEventListener('click', send);

    async function send() {
        const query = input.value.trim();
        if (!query) return;

        // 1. Add User Bubble
        chat.innerHTML += `<div class="msg-user">${query}</div>`;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{ role: 'user', content: query }] })
            });

            const data = await res.json();

            // 2. Safety: check if message exists to avoid "undefined"
            const aiMessage = data.message || "I found some opportunities for you below.";
            chat.innerHTML += `<div class="msg-ai">${aiMessage}</div>`;

            // 3. Render Cards
            const grid = document.getElementById('results-grid');
            grid.innerHTML = '';
            document.getElementById('results-panel').style.display = 'block';
            
            const results = data.results || [];
            document.getElementById('count-text').innerText = `${results.length} Found`;

            results.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <strong>${item.title || 'Untitled'}</strong>
                        <p style="font-size:12px; color:#666">${item.description || ''}</p>
                        <a href="${item.url}" target="_blank" style="color:green; font-size:12px;">Apply ↗</a>
                    </div>
                `;
            });

        } catch (e) {
            chat.innerHTML += `<div class="msg-ai" style="color:red">Error connecting to engine.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
